services:
  postgres:
    image: postgres:15
    container_name: smarttask-postgres
    restart: always
    environment:
      POSTGRES_DB: smart_task_db
      POSTGRES_USER: smart_user
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: smarttask-backend
    restart: always
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/smart_task_db
      SPRING_DATASOURCE_USERNAME: smart_user
      SPRING_DATASOURCE_PASSWORD: password123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

volumes:
  postgres_data: